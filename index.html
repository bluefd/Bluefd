<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueFD | Bio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 50%, #0d1b2a 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background Blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 15s infinite ease-in-out;
            z-index: -1;
        }

        .blob-1 {
            width: 300px;
            height: 300px;
            background: #00d4ff;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .blob-2 {
            width: 250px;
            height: 250px;
            background: #ff006e;
            bottom: -50px;
            right: -50px;
            animation-delay: 3s;
        }

        .blob-3 {
            width: 200px;
            height: 200px;
            background: #8338ec;
            top: 50%;
            right: 10%;
            animation-delay: 6s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0px, 0px); }
            25% { transform: translate(20px, -20px); }
            50% { transform: translate(0px, 30px); }
            75% { transform: translate(-20px, -10px); }
        }

        .container {
            width: 100%;
            max-width: 420px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        /* Profile Section */
        .profile-section {
            margin-bottom: 40px;
            animation: slideInDown 0.8s ease-out;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid #00d4ff;
            margin-bottom: 16px;
            object-fit: cover;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.4), 0 15px 35px rgba(0, 0, 0, 0.3);
            animation: pulse-glow 3s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 40px rgba(0, 212, 255, 0.4), 0 15px 35px rgba(0, 0, 0, 0.3); }
            50% { box-shadow: 0 0 60px rgba(0, 212, 255, 0.6), 0 15px 35px rgba(0, 0, 0, 0.3); }
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #00d4ff, #ff006e, #8338ec);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: slideInDown 0.8s ease-out 0.1s backwards;
        }

        .tagline {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 8px;
            font-weight: 500;
            animation: slideInDown 0.8s ease-out 0.2s backwards;
        }

        .bio {
            color: #cbd5e1;
            font-size: 0.9rem;
            margin-bottom: 30px;
            animation: slideInDown 0.8s ease-out 0.3s backwards;
        }

        /* Links Container */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }

        /* Liquid Link Card */
        .link-card {
            position: relative;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            padding: 16px 24px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 1rem;
            overflow: hidden;
            border: 2px solid transparent;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: slideInUp 0.6s ease-out backwards;
        }

        .link-card:nth-child(1) { animation-delay: 0.4s; }
        .link-card:nth-child(2) { animation-delay: 0.5s; }
        .link-card:nth-child(3) { animation-delay: 0.6s; }
        .link-card:nth-child(4) { animation-delay: 0.7s; }

        /* Liquid background effect */
        .link-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: inherit;
            border-radius: 50%;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 0;
        }

        .link-card:hover::before {
            left: 0;
            border-radius: 20px;
        }

        .link-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .link-card > * {
            position: relative;
            z-index: 1;
        }

        .link-card i {
            font-size: 1.3rem;
            margin-right: 15px;
            width: 24px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .link-card:hover i:first-child {
            transform: scale(1.2) rotate(5deg);
        }

        .link-text {
            flex-grow: 1;
            text-align: left;
        }

        .arrow {
            font-size: 0.9rem;
            margin-left: auto;
            transition: transform 0.3s ease;
        }

        .link-card:hover .arrow {
            transform: translateX(4px);
        }

        /* Button Colors with Gradients */
        .btn-email {
            background: linear-gradient(135deg, #ff5252, #f44336);
            box-shadow: 0 8px 25px rgba(244, 67, 54, 0.25);
        }

        .btn-email:hover {
            box-shadow: 0 15px 50px rgba(244, 67, 54, 0.4);
        }

        .btn-whatsapp {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            box-shadow: 0 8px 25px rgba(56, 239, 125, 0.25);
        }

        .btn-whatsapp:hover {
            box-shadow: 0 15px 50px rgba(56, 239, 125, 0.4);
        }

        .btn-youtube {
            background: linear-gradient(135deg, #e52d27, #b31217);
            box-shadow: 0 8px 25px rgba(229, 45, 39, 0.25);
        }

        .btn-youtube:hover {
            box-shadow: 0 15px 50px rgba(229, 45, 39, 0.4);
        }

        .btn-facebook {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            box-shadow: 0 8px 25px rgba(0, 114, 255, 0.25);
        }

        .btn-facebook:hover {
            box-shadow: 0 15px 50px rgba(0, 114, 255, 0.4);
        }

        /* Social Icons Bottom */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            animation: slideInUp 0.8s ease-out 0.8s backwards;
        }

        .social-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00d4ff;
            font-size: 1.2rem;
            text-decoration: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .social-icon:hover {
            background: linear-gradient(135deg, #00d4ff, #ff006e);
            color: white;
            transform: translateY(-5px) scale(1.1);
            border-color: transparent;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }

        /* Footer */
        footer {
            font-size: 0.75rem;
            color: #64748b;
            letter-spacing: 0.5px;
            animation: fadeIn 1s ease-out 1s backwards;
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                max-width: 100%;
            }

            h1 {
                font-size: 1.75rem;
            }

            .link-card {
                padding: 14px 20px;
                font-size: 0.95rem;
            }

            .link-card i {
                font-size: 1.2rem;
                margin-right: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background Blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="container">
        <!-- Profile Section -->
        <div class="profile-section">
            <img class="profile-img" src="https://i.ibb.co.com/Q7kdGVTB/image.png" alt="BlueFD Profile">
            <h1>BlueFD</h1>
            <p class="tagline">Content Creator & Digital Media</p>
            <p class="bio">Creating amazing content across multiple platforms 🚀</p>
        </div>

        <!-- Main Links -->
        <div class="links-container">
            <a href="mailto:farisabdillahchanel@gmail.com" class="link-card btn-email" target="_blank">
                <i class="fa-regular fa-envelope"></i>

            </a>

            <a href="https://wa.me/6285861767031?text=Halo%20BlueFD,%20saya%20tertarik%20untuk%20bekerjasama" class="link-card btn-whatsapp" target="_blank">

                <i class="fa-solid fa-arrow-right-long arrow"></i>

            <a href="https://www.facebook.com/farsdlh" class="link-card btn-facebook" target="_blank">
                <i class="fa-brands fa-facebook"></i>
                <span class="link-text">Facebook Profile</span>
                <i class="fa-solid fa-arrow-right-long arrow"></i>

        </div>

        <!-- Social Icons -->
        <div class="social-icons">
            <a href="https://www.youtube.com/@BlueFD" class="social-icon" title="YouTube">
                <i class="fa-brands fa-youtube"></i>
            </a>
            <a href="https://www.facebook.com/farsdlh" class="social-icon" title="Facebook">

            </a>
            <a href="https://wa.me/6285861767031" class="social-icon" title="WhatsApp">
                <i class="fa-brands fa-whatsapp"></i>
            </a>
        </div>

        <!-- Footer -->
        <footer>
            &copy; 2026 BlueFD. All rights reserved.
        </footer>
    </div>
</body>
</html>
